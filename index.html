<html lang="ro" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Hub — Gzeu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root,[data-theme="light"]{
--bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--border:#d4d1ca;
--text:#28251d;--muted:#7a7974;--faint:#bab9b4;
--primary:#01696f;--primary-h:#0c4e54;
--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
--radius:8px;
}
[data-theme="dark"]{
--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
--text:#e2e2e2;--muted:#888;--faint:#444;
--primary:#4f98a3;--primary-h:#227f8b;
--shadow:0 1px 3px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* HEADER */
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
.header-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.logo-mark{width:28px;height:28px;background:var(--primary);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.header-tabs{display:flex;gap:2px;margin-left:16px}
.tab-btn{padding:5px 12px;border-radius:6px;font-size:13px;color:var(--muted);transition:all .15s}
.tab-btn:hover{color:var(--text);background:var(--surface2)}
.tab-btn.active{color:var(--text);background:var(--surface2);font-weight:500}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.theme-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;border:1px solid var(--border)}
.theme-btn:hover{color:var(--text);background:var(--surface2)}
.profile-chip{display:flex;align-items:center;gap:6px;padding:3px 10px 3px 4px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--muted)}
.profile-chip img{width:22px;height:22px;border-radius:50%}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px)}
.sidebar{border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.main{padding:20px 24px;max-width:1100px}

/* SIDEBAR */
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:0 6px;margin-bottom:6px}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:5px 8px;border-radius:5px;font-size:13px;color:var(--muted);transition:all .12s;text-align:left}
.filter-btn:hover{color:var(--text);background:var(--surface2)}
.filter-btn.active{color:var(--primary);background:rgba(79,152,163,.08);font-weight:500}
.filter-count{font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--faint)}
.lang-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:6px}

/* STATS MINI */
.stat-mini{display:flex;justify-content:space-between;padding:5px 8px;font-size:12px;color:var(--muted)}
.stat-mini strong{color:var(--text);font-weight:600}

/* SEARCH */
.search-bar{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font:inherit;font-size:13px;color:var(--text);transition:border .15s;outline:none}
.search-input:focus{border-color:var(--primary)}
.search-input::placeholder{color:var(--faint)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
.kbd{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--faint);position:absolute;right:8px;top:50%;transform:translateY(-50%)}

/* SORT ROW */
.sort-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:12px;color:var(--muted)}
.sort-row select{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font:inherit;font-size:12px;color:var(--text);outline:none;cursor:pointer}
.results-count{margin-left:auto;color:var(--faint)}

/* REPO GRID */
.repo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.repo-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s,box-shadow .15s;cursor:pointer;position:relative}
.repo-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.repo-card.favorited{border-color:var(--primary)}
.repo-header{display:flex;align-items:flex-start;gap:8px}
.repo-icon{width:32px;height:32px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.repo-name{font-weight:600;font-size:13px;color:var(--text);line-height:1.3}
.repo-private{font-size:10px;border:1px solid var(--border);padding:1px 6px;border-radius:10px;color:var(--faint);font-weight:500;margin-left:auto;flex-shrink:0}
.fav-btn{position:absolute;top:10px;right:12px;font-size:16px;color:var(--faint);transition:color .15s;padding:2px}
.fav-btn:hover{color:#f5a623}
.fav-btn.on{color:#f5a623}
.repo-desc{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:100%}
.repo-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta-chip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.repo-topics{display:flex;flex-wrap:wrap;gap:4px}
.topic-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(79,152,163,.1);color:var(--primary);border:1px solid rgba(79,152,163,.2)}
.repo-date{font-size:11px;color:var(--faint)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;padding-bottom:24px}
.page-btn{min-width:32px;height:32px;border-radius:6px;font-size:13px;padding:0 10px;border:1px solid var(--border);color:var(--muted);transition:all .15s}
.page-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.35;cursor:not-allowed}

/* VERCEL PANEL */
.vercel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.vercel-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.vercel-card:hover{border-color:var(--primary)}
.vercel-name{font-weight:600;font-size:13px}
.vercel-date{font-size:11px;color:var(--faint)}
.vercel-link{font-size:11px;color:var(--primary);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-open{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:var(--primary);color:#fff;border-radius:6px;font-size:12px;font-weight:500;transition:background .15s}
.btn-open:hover{background:var(--primary-h)}

/* PANEL */
.panel-header{margin-bottom:18px}
.panel-title{font-size:17px;font-weight:600}
.panel-sub{font-size:13px;color:var(--muted);margin-top:3px}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:1000;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:auto}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:700px){
.layout{grid-template-columns:1fr}
.sidebar{display:none}
.repo-grid{grid-template-columns:1fr}
}
</style>
</head>

  const stars=REPOS.reduce((s,r)=>s+r.stars,0),issues=REPOS.reduce((s,r)=>s+r.issues,0),forks=REPOS.reduce((s,r)=>s+r.forks,0);
  const withTopics=REPOS.filter(r=>r.topics.length).length;
  document.getElementById('cnt-all').textContent=REPOS.length;
  document.getElementById('cnt-fav').textContent=favorites.size;
  document.getElementById('cnt-pub').textContent=pub;
  document.getElementById('cnt-priv').textContent=priv;
  document.getElementById('s-total').textContent=REPOS.length;
  document.getElementById('s-stars').textContent=stars;
  document.getElementById('s-issues').textContent=issues;
  document.getElementById('s-forks').textContent=forks;
  document.getElementById('s-topics').textContent=withTopics;
  const langs=[...new Set(REPOS.map(r=>r.lang).filter(Boolean))].sort();
  document.getElementById('lang-filters').innerHTML=langs.map(l=>{
    const cnt=REPOS.filter(r=>r.lang===l).length,col=LANG_COLOR[l]||'#888';
    return`<button class="filter-btn${langFilter===l?' active':''}" onclick="setLang('${l}',this)"><span style="display:flex;align-items:center;gap:6px;"><span class="lang-dot" style="background:${col}"></span>${l}</span><span class="filter-count">${cnt}</span></button>`;
  }).join('');
  document.getElementById('last-updated').textContent='actualizat '+relTime(new Date().toISOString());
}

function getFiltered(){
  let repos=[...REPOS];
  if(filter==='fav')repos=repos.filter(r=>favorites.has(r.name));
  else if(filter==='public')repos=repos.filter(r=>!r.private);
  else if(filter==='private')repos=repos.filter(r=>r.private);
  if(langFilter)repos=repos.filter(r=>r.lang===langFilter);
  if(searchQ){const q=searchQ.toLowerCase();repos=repos.filter(r=>r.name.toLowerCase().includes(q)||(r.desc||'').toLowerCase().includes(q)||r.topics.some(t=>t.includes(q)));}
  const s=document.getElementById('sort-sel').value;
  if(s==='stars')repos.sort((a,b)=>b.stars-a.stars);
  else if(s==='issues')repos.sort((a,b)=>b.issues-a.issues);
  else if(s==='alpha')repos.sort((a,b)=>a.name.localeCompare(b.name));
  else repos.sort((a,b)=>new Date(b.updated)-new Date(a.updated));
  return repos;
}

function render(){
  const repos=getFiltered(),total=repos.length,pages=Math.ceil(total/PER_PAGE)||1;
  if(page>pages)page=1;
  const slice=repos.slice((page-1)*PER_PAGE,page*PER_PAGE);
  document.getElementById('results-count').textContent=total+' repo-uri';
  const grid=document.getElementById('repo-grid');
  if(!slice.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>Niciun repo găsit</p></div>`;return;}
  grid.innerHTML=slice.map(r=>{
    const col=LANG_COLOR[r.lang]||'#888',isFav=favorites.has(r.name);
    const topics=r.topics.slice(0,3).map(t=>`<span class="topic-tag">${t}</span>`).join('');
    const hp=r.homepage?`<a href="${r.homepage}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="font-size:11px;color:var(--primary);font-family:'JetBrains Mono',monospace;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🔗 ${r.homepage.replace('https://','')}</a>`:'';
    return`<div class="repo-card${isFav?' favorited':''}" onclick="window.open('${r.url}','_blank','noopener')">
      <button class="fav-btn${isFav?' on':''}" onclick="event.stopPropagation();toggleFav('${r.name}',this)" title="${isFav?'Elimină din':'Adaugă la'} favorite" aria-label="${isFav?'Elimină din':'Adaugă la'} favorite">${isFav?'★':'☆'}</button>
      <div class="repo-header">
        <div class="repo-icon">${REPO_EMOJI(r)}</div>
        <div style="flex:1;min-width:0;padding-right:20px">
          <div class="repo-name">${r.name}</div>
          ${r.private?'<span class="repo-private">🔒 private</span>':''}
        </div>
      </div>
      ${r.desc?`<div class="repo-desc">${r.desc}</div>`:''}
      ${topics?`<div class="repo-topics">${topics}</div>`:''}
      ${hp}
      <div class="repo-meta">
        ${r.lang?`<span class="meta-chip"><span class="lang-dot" style="background:${col}"></span>${r.lang}</span>`:''}
        ${r.stars>0?`<span class="meta-chip">⭐ ${r.stars}</span>`:''}
        ${r.issues>0?`<span class="meta-chip">🔴 ${r.issues}</span>`:''}
        ${r.forks>0?`<span class="meta-chip">🍴 ${r.forks}</span>`:''}
        <span class="repo-date" style="margin-left:auto">${relTime(r.updated)}</span>
      </div>
    </div>`;
  }).join('');
  const pag=document.getElementById('pagination');
  if(pages<=1){pag.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="gotoPage(${page-1})" ${page===1?'disabled':''} aria-label="Pagina anterioară">←</button>`;
  for(let i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-page)<=1)html+=`<button class="page-btn${i===page?' active':''}" onclick="gotoPage(${i})" aria-label="Pagina ${i}">${i}</button>`;else if(Math.abs(i-page)===2)html+='<span style="color:var(--faint);padding:0 4px">…</span>';}
  html+=`<button class="page-btn" onclick="gotoPage(${page+1})" ${page===pages?'disabled':''} aria-label="Pagina următoare">→</button>`;
  pag.innerHTML=html;
}

function gotoPage(p){page=p;render();window.scrollTo(0,0);}

function renderVercel(){
  document.getElementById('vercel-count').textContent=VERCEL_PROJECTS.length;
  document.getElementById('vercel-grid').innerHTML=VERCEL_PROJECTS.map(p=>`<div class="vercel-card">
    <div><div class="vercel-name">${p.name}</div><div class="vercel-date">Creat: ${p.created}</div></div>
    <div class="vercel-link">${p.url.replace('https://','')}</div>
    <a class="btn-open" href="${p.url}" target="_blank" rel="noopener noreferrer">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Deschide
    </a>
  </div>`).join('');
}

function toggleFav(name,btn){
  if(favorites.has(name)){favorites.delete(name);btn.textContent='☆';btn.classList.remove('on');btn.closest('.repo-card').classList.remove('favorited');toast('Eliminat din favorite');}
  else{favorites.add(name);btn.textContent='★';btn.classList.add('on');btn.closest('.repo-card').classList.add('favorited');toast('⭐ Adăugat la favorite');}
  updateSidebar();render();
}

function setFilter(f,el){
  filter=f;langFilter='';
  document.querySelectorAll('.sidebar-section .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  page=1;render();
}

function setLang(l,el){
  langFilter=langFilter===l?'':l;filter='all';
  document.querySelectorAll('.sidebar-section .filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#lang-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  if(langFilter)el.classList.add('active');
  else document.querySelector('.sidebar-section .filter-btn').classList.add('active');
  page=1;updateSidebar();render();
}

function onSearch(){searchQ=document.getElementById('search').value.trim();page=1;render();}

function switchTab(tab,el){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-repos').style.display=tab==='repos'?'':'none';
  document.getElementById('panel-vercel').style.display=tab==='vercel'?'':'none';
}

function toggleTheme(){
  const h=document.documentElement,t=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',t);
  document.getElementById('theme-icon').innerHTML=t==='dark'?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>':'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
}

function toast(msg){
  const w=document.getElementById('toast-wrap'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;w.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),250);},2200);
}

document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('search').focus();}
  if(e.key==='Escape'){document.getElementById('search').value='';searchQ='';render();document.getElementById('search').blur();}
});

updateSidebar();
render();
renderVercel();
</script>
</body>
</html>
