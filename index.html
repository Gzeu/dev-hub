<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-blue:#006494;
  --color-orange:#da7101;--color-gold:#d19900;--color-purple:#7a39bb;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
}
[data-theme="dark"]{
  --color-bg:#0e0d0c;--color-surface:#141311;--color-surface-2:#181614;
  --color-surface-offset:#1a1917;--color-surface-dynamic:#222120;
  --color-divider:#262523;--color-border:#333130;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#1e3437;
  --color-success:#6daa45;--color-blue:#5591c7;
  --color-orange:#fdab43;--color-gold:#e8af34;--color-purple:#a86fdf;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.3);
  --shadow-md:0 4px 12px oklch(0 0 0/0.4);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.5);
}
@media(prefers-color-scheme:light){:root:not([data-theme]){
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-blue:#006494;
  --color-orange:#da7101;--color-gold:#d19900;--color-purple:#7a39bb;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
}}

html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
a,button,[role="button"]{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition),opacity var(--transition)}

.header{position:sticky;top:0;z-index:100;background:color-mix(in oklch,var(--color-bg) 85%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--color-border);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{display:flex;align-items:center;gap:0.75rem}
.logo-icon{width:36px;height:36px;flex-shrink:0}
.logo-text{font-size:var(--text-sm);font-weight:600;letter-spacing:-0.02em}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-family:var(--font-mono)}
.header-actions{display:flex;align-items:center;gap:0.5rem}
.theme-toggle{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted);border:1px solid var(--color-border)}
.theme-toggle:hover{background:var(--color-surface-offset);color:var(--color-text)}
.gh-link{display:flex;align-items:center;gap:0.5rem;font-size:var(--text-xs);font-weight:500;color:var(--color-text-muted);padding:0.375rem 0.75rem;border-radius:var(--radius-md);border:1px solid var(--color-border)}
.gh-link:hover{background:var(--color-surface-offset);color:var(--color-text)}

.page{max-width:1280px;margin:0 auto;padding:2rem 1.5rem}
.profile-bar{display:flex;align-items:center;gap:1.25rem;margin-bottom:2rem;padding:1.25rem 1.5rem;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
.avatar{width:52px;height:52px;border-radius:var(--radius-full);border:2px solid var(--color-border)}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:var(--text-lg);font-weight:600;letter-spacing:-0.02em}
.profile-bio{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:0.2rem}
.profile-stats{display:flex;gap:1.5rem;flex-shrink:0}
.stat{text-align:center}
.stat-num{font-size:var(--text-lg);font-weight:700;font-family:var(--font-mono);color:var(--color-primary);line-height:1}
.stat-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:0.15rem}

.tabs{display:flex;gap:0.25rem;margin-bottom:1.5rem;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:0.25rem}
.tab{flex:1;padding:0.6rem 1rem;font-size:var(--text-sm);font-weight:500;border-radius:var(--radius-md);color:var(--color-text-muted);text-align:center;transition:all var(--transition)}
.tab:hover{color:var(--color-text);background:var(--color-surface-offset)}
.tab.active{color:var(--color-text);background:var(--color-surface-offset);box-shadow:var(--shadow-sm)}
.tab-count{display:inline-block;margin-left:0.4rem;padding:0.1rem 0.45rem;font-size:var(--text-xs);font-family:var(--font-mono);background:var(--color-primary-highlight);color:var(--color-primary);border-radius:var(--radius-full)}

.filters{display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:0.55rem 0.75rem 0.55rem 2.25rem;font-size:var(--text-sm);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text);outline:none}
.search-box input::placeholder{color:var(--color-text-faint)}
.search-box input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 15%,transparent)}
.search-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);color:var(--color-text-faint);pointer-events:none}
.lang-filter{display:flex;gap:0.3rem;flex-wrap:wrap}
.lang-btn{padding:0.35rem 0.7rem;font-size:var(--text-xs);font-weight:500;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);transition:all var(--transition)}
.lang-btn:hover,.lang-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}

.repos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:1rem}
.repo-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition),transform var(--transition),border-color var(--transition)}
.repo-card:hover{box-shadow:var(--shadow-md);border-color:color-mix(in oklch,var(--color-primary) 30%,var(--color-border));transform:translateY(-1px)}
.repo-header{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem}
.repo-name{font-size:var(--text-sm);font-weight:600;font-family:var(--font-mono);color:var(--color-primary)}
.repo-name:hover{text-decoration:underline}
.repo-badges{display:flex;gap:0.35rem;flex-shrink:0;flex-wrap:wrap}
.badge{padding:0.15rem 0.5rem;font-size:var(--text-xs);border-radius:var(--radius-full);font-weight:500;font-family:var(--font-mono)}
.badge-issues{background:color-mix(in oklch,var(--color-orange) 12%,transparent);color:var(--color-orange);border:1px solid color-mix(in oklch,var(--color-orange) 20%,transparent)}
.badge-fork{background:color-mix(in oklch,var(--color-blue) 12%,transparent);color:var(--color-blue);border:1px solid color-mix(in oklch,var(--color-blue) 20%,transparent)}
.repo-desc{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5;flex:1}
.repo-footer{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
.lang-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
.lang-label{font-size:var(--text-xs);color:var(--color-text-muted)}
.repo-date{font-size:var(--text-xs);color:var(--color-text-faint);margin-left:auto;font-family:var(--font-mono)}
.repo-topics{display:flex;gap:0.3rem;flex-wrap:wrap}
.topic-tag{padding:0.1rem 0.45rem;font-size:var(--text-xs);border-radius:var(--radius-full);background:var(--color-surface-offset);color:var(--color-text-muted);border:1px solid var(--color-border)}

.threads-list{display:flex;flex-direction:column;gap:0.75rem}
.thread-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:1.25rem;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition)}
.thread-card:hover{box-shadow:var(--shadow-md)}
.thread-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem}
.thread-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-open{background:var(--color-orange)}
.status-resolved{background:var(--color-success)}
.thread-project{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--color-primary)}
.thread-date{font-size:var(--text-xs);color:var(--color-text-faint);margin-left:auto;font-family:var(--font-mono)}
.thread-content{font-size:var(--text-sm);color:var(--color-text);margin-bottom:0.5rem}
.thread-page{font-size:var(--text-xs);color:var(--color-text-faint)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center;color:var(--color-text-muted)}
.empty svg{margin-bottom:1rem;color:var(--color-text-faint)}
.empty p{max-width:32ch;font-size:var(--text-sm)}

.no-results{padding:3rem 2rem;text-align:center;color:var(--color-text-muted);font-size:var(--text-sm)}

.pagination{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-top:2rem}
.page-btn{padding:0.5rem 1rem;font-size:var(--text-sm);border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted)}
.page-btn:hover:not(:disabled){background:var(--color-surface-offset);color:var(--color-text)}
.page-btn:disabled{opacity:0.4;cursor:not-allowed}
.page-info{font-size:var(--text-xs);color:var(--color-text-muted);font-family:var(--font-mono)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-title{font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.08em}

.tab-panel{display:none}.tab-panel.active{display:block}

@media(max-width:600px){
  .header{padding:0.75rem 1rem}
  .page{padding:1.25rem 1rem}
  .profile-bar{flex-wrap:wrap}
  .profile-stats{width:100%;justify-content:space-around;border-top:1px solid var(--color-border);padding-top:0.75rem;margin-top:0.25rem}
  .tabs{flex-wrap:wrap}
  .filters{flex-direction:column;align-items:stretch}
  .search-box{min-width:unset}
}
</style>

const LANG_COLORS = {
  TypeScript:"#3178c6",JavaScript:"#f1e05a",Python:"#3572A5",
  Rust:"#dea584",HTML:"#e34c26",Lua:"#000080","C++":"#f34b7d",
  PowerShell:"#012456"
};

const PER_PAGE = 12;
let currentPage = 1;
let filteredRepos = [...REPOS];
let activeLang = 'All';
let searchQuery = '';

function getLangColor(lang){return LANG_COLORS[lang]||'#8b949e'}

function timeAgo(dateStr){
  const d=new Date(dateStr),n=new Date();
  const diff=Math.floor((n-d)/86400000);
  if(diff===0)return 'azi';
  if(diff===1)return 'ieri';
  if(diff<7)return diff+'z';
  if(diff<30)return Math.floor(diff/7)+'s';
  if(diff<365)return Math.floor(diff/30)+'l';
  return Math.floor(diff/365)+'a';
}

function renderRepoCard(repo){
  const langColor=getLangColor(repo.lang);
  const topicsHtml=repo.topics.length?`<div class="repo-topics">${repo.topics.slice(0,3).map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div>`:'';
  return `
<a href="${repo.url}" target="_blank" rel="noopener noreferrer" class="repo-card" title="${repo.name}">
  <div class="repo-header">
    <span class="repo-name">${repo.name}</span>
    <div class="repo-badges">
      ${repo.fork?'<span class="badge badge-fork">fork</span>':''}
      ${repo.issues>0?`<span class="badge badge-issues">${repo.issues} issue${repo.issues>1?'s':''}</span>`:''}
    </div>
  </div>
  <p class="repo-desc">${repo.desc||'<em>Fără descriere</em>'}</p>
  ${topicsHtml}
  <div class="repo-footer">
    ${repo.lang?`<span class="lang-dot" style="background:${langColor}"></span><span class="lang-label">${repo.lang}</span>`:''}
    <span class="repo-date">${timeAgo(repo.updated)}</span>
  </div>
</a>`;}

function applyFilters(){
  filteredRepos=REPOS.filter(r=>{
    const matchLang=activeLang==='All'||(r.lang||'Other')===activeLang;
    const q=searchQuery.toLowerCase();
    const matchSearch=!q||r.name.toLowerCase().includes(q)||(r.desc||'').toLowerCase().includes(q)||r.topics.some(t=>t.includes(q));
    return matchLang&&matchSearch;
  });
  currentPage=1;
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('repos-grid');
  const start=(currentPage-1)*PER_PAGE;
  const slice=filteredRepos.slice(start,start+PER_PAGE);
  const count=document.getElementById('results-count');
  const tabCount=document.getElementById('tab-repo-count');
  count.textContent=`${filteredRepos.length} proiect${filteredRepos.length!==1?'e':''}`;
  tabCount.textContent=filteredRepos.length;
  if(!filteredRepos.length){grid.innerHTML='<div class="no-results">Niciun repo găsit</div>';renderPagination();return;}
  grid.innerHTML=slice.map(renderRepoCard).join('');
  renderPagination();
}

function renderPagination(){
  const pg=document.getElementById('pagination');
  const total=Math.ceil(filteredRepos.length/PER_PAGE);
  if(total<=1){pg.innerHTML='';return;}
  pg.innerHTML=`
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>
    <span class="page-info">${currentPage} / ${total}</span>
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next →</button>
  `;
}
function goPage(p){currentPage=p;renderGrid();window.scrollTo({top:0,behavior:'smooth'})}

function buildLangFilters(){
  const langs=['All',...[...new Set(REPOS.map(r=>r.lang||'Other'))].sort()];
  const container=document.getElementById('lang-filters');
  container.innerHTML=langs.map(l=>`<button class="lang-btn ${l==='All'?'active':''}" data-lang="${l}">${l}</button>`).join('');
  container.querySelectorAll('.lang-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeLang=btn.dataset.lang;
      container.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
  });
}

document.getElementById('search-repos').addEventListener('input',e=>{
  searchQuery=e.target.value;applyFilters();
});

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');t.setAttribute('aria-selected','false')});
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');tab.setAttribute('aria-selected','true');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
  });
});

(function(){
  const t=document.querySelector('[data-theme-toggle]');
  const r=document.documentElement;
  let d=r.getAttribute('data-theme')||'dark';
  r.setAttribute('data-theme',d);
  function setIcon(){t.innerHTML=d==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}
  setIcon();
  t&&t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);setIcon()});
})();

buildLangFilters();
renderGrid();

document.getElementById('threads-container').innerHTML=`
<div style="padding:1rem">
  <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:2rem;text-align:center;margin-bottom:1rem">

    <h3 style="font-size:var(--text-sm);font-weight:600;margin-bottom:0.5rem">Vercel Toolbar Threads</h3>

    <div style="display:inline-flex;align-items:center;gap:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint);font-family:var(--font-mono);background:var(--color-surface-offset);padding:0.5rem 1rem;border-radius:var(--radius-md);border:1px solid var(--color-border)">
      Fără thread-uri distribuite disponibile momentan
    </div>
  </div>
  <div style="font-size:var(--text-xs);color:var(--color-text-faint);text-align:center">Thread-urile apar automat când cineva lasă feedback pe un deployment Vercel preview.</div>
</div>`;
document.getElementById('tab-thread-count').textContent='0';
</script>
